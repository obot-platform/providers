name: "Auth0"
image: "ghcr.io/obot-platform/enterprise-providers/auth0-auth-provider:main"
port: 8000
path: "/"
icon: "https://cdn.jsdelivr.net/npm/simple-icons@v13/icons/auth0.svg"
description: "Auth provider for Auth0"
link: "https://auth0.com/"
requiredEntitlements:
  - "OBOT_ENTERPRISE_AUTH_PROVIDERS"
requiredConfigurationParameters:
  - name: "OBOT_AUTH0_AUTH_PROVIDER_CLIENT_ID"
    friendlyName: "Client ID"
    description: "Client ID for your Auth0 application. Can be found in Auth0 Dashboard > Applications > Settings"
    sensitive: false
  - name: "OBOT_AUTH0_AUTH_PROVIDER_CLIENT_SECRET"
    friendlyName: "Client Secret"
    description: "Client secret for your Auth0 application. Can be found in Auth0 Dashboard > Applications > Settings"
    sensitive: true
  - name: "OBOT_AUTH0_AUTH_PROVIDER_DOMAIN"
    friendlyName: "Auth0 Domain"
    description: "Your Auth0 domain (e.g. your-tenant.us.auth0.com). Can be found in Auth0 Dashboard > Applications > Settings"
    sensitive: false
  - name: "OBOT_AUTH0_AUTH_PROVIDER_MGMT_CLIENT_ID"
    friendlyName: "Management API Client ID"
    description: "Client ID for a Machine-to-Machine application authorized for the Auth0 Management API. Create one in Auth0 Dashboard > Applications."
    sensitive: false
  - name: "OBOT_AUTH0_AUTH_PROVIDER_MGMT_CLIENT_SECRET"
    friendlyName: "Management API Client Secret"
    description: "Client secret for the Management API Machine-to-Machine application."
    sensitive: true
  - name: "OBOT_AUTH_PROVIDER_COOKIE_SECRET"
    friendlyName: "Cookie Secret"
    description: "Secret used to encrypt cookies. Must be a random string of length 16, 24, or 32."
    sensitive: true
    hidden: true
  - name: "OBOT_AUTH_PROVIDER_EMAIL_DOMAINS"
    friendlyName: "Allowed E-Mail Domains"
    description: "A list of email domains that are allowed to authenticate with this provider. * is a special value that allows all domains."
    sensitive: false
optionalConfigurationParameters:
  - name: "OBOT_AUTH_PROVIDER_POSTGRES_CONNECTION_DSN"
    friendlyName: "PostgreSQL connection string (DSN)"
    description: "The connection string for a PostgreSQL database to use for session storage. If unset, cookies will be used for session storage instead."
    sensitive: true
    hidden: true
  - name: "OBOT_AUTH_PROVIDER_TOKEN_REFRESH_DURATION"
    friendlyName: "Token Refresh Duration"
    description: "Time to wait before attempting to refresh auth tokens. Should be in a format like 1h1m1s. Default: 1h"
    sensitive: false
  - name: "OBOT_AUTH0_AUTH_PROVIDER_INSECURE_ALLOW_UNVERIFIED_EMAIL"
    friendlyName: "Allow Unverified Emails"
    description: "Allow logins where the IdP does not assert email_verified=true. This weakens account/email-domain validation. Only enable if your Auth0 tenant requires it. Default: false"
    sensitive: false
    hidden: true
postgresTablePrefix: "auth0_"
