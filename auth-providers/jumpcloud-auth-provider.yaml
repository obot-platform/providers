name: "JumpCloud"
image: "ghcr.io/obot-platform/enterprise-providers/jumpcloud-auth-provider:main"
port: 8000
path: "/"
icon: "https://jumpcloud.com/wp-content/themes/jumpcloud/assets/images/favicons/android-icon-192x192-light.png"
description: "Auth provider for JumpCloud"
link: "https://jumpcloud.com/"
requiredEntitlements:
  - "OBOT_ENTERPRISE_AUTH_PROVIDERS"
requiredConfigurationParameters:
  - name: "OBOT_JUMPCLOUD_AUTH_PROVIDER_CLIENT_ID"
    friendlyName: "Client ID"
    description: "Client ID for your JumpCloud custom OIDC application."
    sensitive: false
  - name: "OBOT_JUMPCLOUD_AUTH_PROVIDER_CLIENT_SECRET"
    friendlyName: "Client Secret"
    description: "Client secret for your JumpCloud custom OIDC application."
    sensitive: true
  - name: "OBOT_AUTH_PROVIDER_EMAIL_DOMAINS"
    friendlyName: "Allowed E-Mail Domains"
    description: "A list of email domains that are allowed to authenticate with this provider. * is a special value that allows all domains."
    sensitive: false
  - name: "OBOT_AUTH_PROVIDER_COOKIE_SECRET"
    friendlyName: "Cookie Secret"
    description: "Secret used to encrypt cookies. Must be a random string of length 16, 24, or 32."
    sensitive: true
    hidden: true
optionalConfigurationParameters:
  - name: "OBOT_JUMPCLOUD_AUTH_PROVIDER_SERVICE_ACCOUNT_CLIENT_ID"
    friendlyName: "Service Account Client ID"
    description: "Client ID for a JumpCloud API service account. Configure this and the matching service account client secret to use service-account authentication instead of an API key."
    sensitive: false
  - name: "OBOT_JUMPCLOUD_AUTH_PROVIDER_SERVICE_ACCOUNT_CLIENT_SECRET"
    friendlyName: "Service Account Client Secret"
    description: "Client secret for a JumpCloud API service account. Configure this and the matching service account client ID to use service-account authentication instead of an API key."
    sensitive: true
  - name: "OBOT_JUMPCLOUD_AUTH_PROVIDER_API_KEY"
    friendlyName: "API Key"
    description: "JumpCloud API key used to list groups, inspect user memberships, and verify account status. Use this if you are not using the service-account client ID and client secret above."
    sensitive: true
  - name: "OBOT_JUMPCLOUD_AUTH_PROVIDER_API_ORG_ID"
    friendlyName: "Org ID"
    description: "Optional JumpCloud org ID header for multi-tenant API requests."
    sensitive: false
  - name: "OBOT_JUMPCLOUD_AUTH_PROVIDER_ISSUER_URL"
    friendlyName: "Issuer URL"
    description: "JumpCloud OIDC issuer URL. Default: https://oauth.id.jumpcloud.com/"
    sensitive: false
  - name: "OBOT_JUMPCLOUD_AUTH_PROVIDER_API_BASE_URL"
    friendlyName: "API Base URL"
    description: "JumpCloud API base URL. Default: https://console.jumpcloud.com. Customers using the EU data center should set this to https://console.eu.jumpcloud.com."
    sensitive: false
  - name: "OBOT_JUMPCLOUD_AUTH_PROVIDER_SERVICE_ACCOUNT_TOKEN_URL"
    friendlyName: "Service Account Token URL"
    description: "OAuth token endpoint for JumpCloud service-account client-credentials exchanges. Use this with the service account fields above. Default: https://admin-oauth.id.jumpcloud.com/oauth2/token. Override this if your JumpCloud region uses a different admin OAuth endpoint."
    sensitive: false
  - name: "OBOT_AUTH_PROVIDER_POSTGRES_CONNECTION_DSN"
    friendlyName: "PostgreSQL connection string (DSN)"
    description: "The connection string for a PostgreSQL database to use for session storage. If unset, cookies will be used for session storage instead."
    sensitive: true
    hidden: true
  - name: "OBOT_AUTH_PROVIDER_TOKEN_REFRESH_DURATION"
    friendlyName: "Token Refresh Duration"
    description: "Time to wait before attempting to refresh auth tokens. Should be in a format like 1h1m1s. Default: 1h"
    sensitive: false
  - name: "OBOT_AUTH_PROVIDER_ENABLE_LOGGING"
    friendlyName: "Enable Logging"
    description: "Set to true to enable request, auth, and standard logging for the auth provider. Default: false"
    sensitive: false
postgresTablePrefix: "jumpcloud_"
