name: "Azure (API Key)"
image: "ghcr.io/obot-platform/enterprise-providers/azure-model-provider:main"
port: 8000
path: "/"
icon: "/admin/assets/azure_openai_icon.svg"
iconDark: "/admin/assets/azure_openai_icon.svg"
description: "Model provider for Azure OpenAI/Foundry models using API key authentication"
link: "https://azure.microsoft.com/en-us/products/ai-services/openai-service"
requiredEntitlements:
  - "OBOT_ENTERPRISE_MODEL_PROVIDERS"
requiredConfigurationParameters:
  - name: "OBOT_AZURE_MODEL_PROVIDER_ENDPOINT"
    friendlyName: "Azure Endpoint"
    description: "Azure service endpoint URL (e.g. https://my-resource.cognitiveservices.azure.com/ or https://my-resource.openai.azure.com/)"
    sensitive: false
  - name: "OBOT_AZURE_MODEL_PROVIDER_API_KEY"
    friendlyName: "API Key"
    description: "Azure API key"
    sensitive: true
  - name: "OBOT_AZURE_MODEL_PROVIDER_DEPLOYMENTS"
    friendlyName: "Deployments"
    description: "List of deployment names with optional usage types (format: deploymentName:usageType). Usage types: 'llm', 'reasoning-llm' (for reasoning models like o1/o3), 'text-embedding', 'image-generation'. If no usage is specified, defaults to 'llm'."
    sensitive: false
optionalConfigurationParameters:
  - name: "OBOT_AZURE_MODEL_PROVIDER_API_VERSION"
    friendlyName: "API Version"
    description: "Azure API version (defaults to 2025-01-01-preview)"
    sensitive: false
dialect: "BifrostRequest"
