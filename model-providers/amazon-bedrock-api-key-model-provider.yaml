name: "Amazon Bedrock (API Key)"
image: "ghcr.io/obot-platform/enterprise-providers/amazon-bedrock-api-key-model-provider:main"
port: 8000
path: "/"
icon: "/admin/assets/amazon-bedrock.png"
description: "Model provider for Amazon Bedrock models using API key authentication"
link: "https://aws.amazon.com/bedrock/"
requiredEntitlements:
  - "OBOT_ENTERPRISE_MODEL_PROVIDERS"
requiredConfigurationParameters:
  - name: "OBOT_AMAZON_BEDROCK_API_KEY_MODEL_PROVIDER_API_KEY"
    friendlyName: "API Key"
    description: "Amazon Bedrock API Key"
    sensitive: true
optionalConfigurationParameters:
  - name: "OBOT_AMAZON_BEDROCK_API_KEY_MODEL_PROVIDER_REGION"
    friendlyName: "AWS Region"
    description: "AWS Region for Amazon Bedrock (defaults to us-east-1)"
    sensitive: false
dialect: "BifrostRequest"
