name: "Amazon Bedrock (Static Credentials)"
image: "ghcr.io/obot-platform/enterprise-providers/amazon-bedrock-model-provider:main"
port: 8000
path: "/"
icon: "/admin/assets/amazon-bedrock.png"
description: "Model provider for Amazon Bedrock models"
link: "https://aws.amazon.com/bedrock/"
requiredEntitlements:
  - "OBOT_ENTERPRISE_MODEL_PROVIDERS"
requiredConfigurationParameters:
  - name: "OBOT_AMAZON_BEDROCK_MODEL_PROVIDER_ACCESS_KEY_ID"
    friendlyName: "AWS Access Key ID"
    description: "AWS Access Key ID"
    sensitive: true
  - name: "OBOT_AMAZON_BEDROCK_MODEL_PROVIDER_SECRET_ACCESS_KEY"
    friendlyName: "AWS Secret Access Key"
    description: "AWS Secret Access Key"
    sensitive: true
optionalConfigurationParameters:
  - name: "OBOT_AMAZON_BEDROCK_MODEL_PROVIDER_SESSION_TOKEN"
    friendlyName: "AWS Session Token"
    description: "AWS Session Token for temporary credentials"
    sensitive: true
  - name: "OBOT_AMAZON_BEDROCK_MODEL_PROVIDER_REGION"
    friendlyName: "AWS Region"
    description: "AWS Region for Amazon Bedrock, defaults to us-east-1"
    sensitive: false
dialect: "BifrostRequest"
