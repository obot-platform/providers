name: "Google Gemini Vertex AI Model Provider"
image: "ghcr.io/obot-platform/enterprise-providers/gemini-vertex-model-provider:main"
port: 8000
path: "/"
icon: "/admin/assets/gemini_icon.svg"
iconDark: "/admin/assets/gemini_icon.svg"
description: "Model provider for Google Gemini Vertex AI"
link: "https://cloud.google.com/vertex-ai"
requiredEntitlements:
  - "OBOT_ENTERPRISE_MODEL_PROVIDERS"
requiredConfigurationParameters:
  - name: "OBOT_GEMINI_VERTEX_MODEL_PROVIDER_GOOGLE_CREDENTIALS_JSON"
    friendlyName: "Google Credentials JSON"
    description: "Google Cloud Account Credentials - JSON File Contents: https://cloud.google.com/iam/docs/keys-create-delete#creating"
    sensitive: true
optionalConfigurationParameters:
  - name: "OBOT_GEMINI_VERTEX_MODEL_PROVIDER_GOOGLE_CLOUD_PROJECT"
    friendlyName: "Project ID"
    description: "Google Cloud Project ID"
    sensitive: false
  - name: "OBOT_GEMINI_VERTEX_MODEL_PROVIDER_GOOGLE_CLOUD_LOCATION"
    friendlyName: "Location"
    description: "Google Cloud Location"
    sensitive: false
