name: "Azure (Entra ID)"
image: "ghcr.io/obot-platform/enterprise-providers/azure-entra-model-provider:main"
port: 8000
path: "/"
icon: "/admin/assets/azure_openai_icon.svg"
iconDark: "/admin/assets/azure_openai_icon.svg"
description: "Model provider for Azure OpenAI/Foundry models using Entra ID service principal authentication"
link: "https://azure.microsoft.com/en-us/products/ai-services/openai-service"
requiredEntitlements:
  - "OBOT_ENTERPRISE_MODEL_PROVIDERS"
requiredConfigurationParameters:
  - name: "OBOT_AZURE_ENTRA_MODEL_PROVIDER_ENDPOINT"
    friendlyName: "Azure Endpoint"
    description: "Azure service endpoint URL (e.g. https://my-resource.cognitiveservices.azure.com/ or https://my-resource.openai.azure.com/)"
    sensitive: false
  - name: "OBOT_AZURE_ENTRA_MODEL_PROVIDER_CLIENT_ID"
    friendlyName: "Client ID"
    description: "Azure Entra ID application (client) ID"
    sensitive: false
  - name: "OBOT_AZURE_ENTRA_MODEL_PROVIDER_CLIENT_SECRET"
    friendlyName: "Client Secret"
    description: "Azure Entra ID client secret"
    sensitive: true
  - name: "OBOT_AZURE_ENTRA_MODEL_PROVIDER_TENANT_ID"
    friendlyName: "Tenant ID"
    description: "Azure Entra ID tenant ID"
    sensitive: false
  - name: "OBOT_AZURE_ENTRA_MODEL_PROVIDER_SUBSCRIPTION_ID"
    friendlyName: "Subscription ID"
    description: "Azure subscription ID"
    sensitive: false
  - name: "OBOT_AZURE_ENTRA_MODEL_PROVIDER_RESOURCE_GROUP"
    friendlyName: "Resource Group"
    description: "Azure resource group containing the Cognitive Services account"
    sensitive: false
  - name: "OBOT_AZURE_ENTRA_MODEL_PROVIDER_RESOURCE_NAME"
    friendlyName: "Resource Name"
    description: "Azure Cognitive Services resource name"
    sensitive: false
optionalConfigurationParameters:
  - name: "OBOT_AZURE_ENTRA_MODEL_PROVIDER_API_VERSION"
    friendlyName: "API Version"
    description: "Azure API version (defaults to 2025-01-01-preview)"
    sensitive: false
dialect: "BifrostRequest"
