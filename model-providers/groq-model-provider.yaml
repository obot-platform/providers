name: "Groq"
command: "groq-model-provider/bin/obot-provider"
validateArgs:
  - validate
icon: "/admin/assets/groq_logo.svg"
description: "Model provider for models running on Groq"
link: "https://groq.com/"
requiredConfigurationParameters:
